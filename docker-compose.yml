services:

  # ── PostgreSQL database ─────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-pizzadb}
      POSTGRES_USER:     ${POSTGRES_USER:-pizza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pizza_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pizza} -d ${POSTGRES_DB:-pizzadb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── FastAPI backend ─────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL:           postgresql+asyncpg://${POSTGRES_USER:-pizza}:${POSTGRES_PASSWORD:-pizza_secret}@db:5432/${POSTGRES_DB:-pizzadb}
      SECRET_KEY:             ${SECRET_KEY:-change-this-in-production-please}
      ALGORITHM:              HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      FIRST_ADMIN_EMAIL:      ${FIRST_ADMIN_EMAIL:-admin@pizza.com}
      FIRST_ADMIN_PASSWORD:   ${FIRST_ADMIN_PASSWORD:-changeme123}
      FIRST_ADMIN_FULL_NAME:  ${FIRST_ADMIN_FULL_NAME:-Administrator}
      FRONTEND_URL:           http://localhost:80
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── React frontend ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL:              ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY:  ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID:       ${VITE_SUPABASE_PROJECT_ID}
        # Browser makes API calls to localhost:8000 (host-side port mapped by 'api')
        VITE_DASHBOARD_API_URL:         http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
